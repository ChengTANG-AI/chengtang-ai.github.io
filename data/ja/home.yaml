hero:
  eyebrow: "Artificial Intelligence and Communication"
  title: "唐 成"
  description: "名古屋工業大学の准教授として，Artificial Intelligence and Communication Laboratory（AIC Lab）を主宰し，人工知能，通信システム，データ駆動型知能に関する研究を行っています．"
  primaryButton: "文献リストを見る"
  secondaryButton: "研究紹介を見る"
biography:
  label: "BIOGRAPHY"
  title: "プロフィール"
  paragraphs:
    - "現在，**[名古屋工業大学](https://www.nitech.ac.jp/)** 大学院工学研究科の准教授として，唐研究室を主宰し，大学院生の研究指導を行っています．"
    - "2020年および2022年に，**[富山大学](https://www.u-toyama.ac.jp/)** にて工学の修士号および博士号を取得しました．2022年から2023年まで，**[名古屋工業大学](https://www.nitech.ac.jp/)** 大学院工学研究科つくり領域 **[平田研究室](https://cem.web.nitech.ac.jp/hilab/)** にて助教として勤務しました．2023年に**[九州大学](https://www.kyushu-u.ac.jp/ja/)** 大学院システム情報科学研究院に着任し，**[島田教授](https://scholar.google.com/citations?user=gc2kslQAAAAJ)** のもとで画像メディア理解研究室に所属しました．2026年より名古屋工業大学に着任し，現在に至ります．"
    - "主な研究分野は，医療データマイニング，時系列予測，コンピュータビジョン，自然言語処理，学習分析，AI創薬，説明可能AI（XAI），最適化などです．"
