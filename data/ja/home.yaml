biography:
  label: "BIOGRAPHY"
  title: "プロフィール"
  paragraphs:
    - "唐 成は，名古屋工業大学 大学院工学研究科の准教授です．人工知能，情報通信技術，データ駆動型モデリングの融合を基盤として研究を行っています．"
    - "主な研究分野は，AI for Communications，Communications for AI，医療AI，時系列知能，ネットワーク知能，エッジ知能，説明可能AI，最適化，AI for Science などです．"
    - "アルゴリズム，情報通信基盤，センシング，実社会応用を結びつけ，信頼性，解釈性，社会的価値を備えた知的システムの実現を目指しています．"
