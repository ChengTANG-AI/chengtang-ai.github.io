  title: "唐 成"
  description: "名古屋工業大学の准教授として，人工知能・通信研究室（AIC Lab）を主宰し，人工知能，通信システム，データ駆動型知能に関する研究に取り組んでいます．"
  primaryButton: "研究業績を見る"
  secondaryButton: "研究紹介を見る"
biography:
  label: "BIOGRAPHY"
  title: "プロフィール"
  paragraphs:
    - "現在，**[名古屋工業大学](https://www.nitech.ac.jp/)** 大学院工学研究科においてテニュア准教授を務め，人工知能・通信研究室（AIC Lab）の主宰者として大学院生の研究指導を行っています．"
    - "2020年および2022年に，**[富山大学](https://www.u-toyama.ac.jp/)** にて工学修士および博士（工学）の学位を取得しました．2022年から2023年までは，**[名古屋工業大学](https://www.nitech.ac.jp/)** 大学院工学研究科つくり領域の **[平田研究室](https://cem.web.nitech.ac.jp/hilab/)** において助教として勤務しました．2023年に **[九州大学](https://www.kyushu-u.ac.jp/ja/)** 大学院システム情報科学研究院に着任し，テニュア助教として **[イメージ・メディア理解研究室](https://www.eng.kyushu-u.ac.jp/lab_electrical33.html)** において研究を行いました．2026年より名古屋工業大学に着任し，現在に至ります．"
    - "主な研究分野は，医療データマイニング，時系列予測，コンピュータビジョン，自然言語処理，ラーニングアナリティクス，AI創薬，説明可能AI（XAI），最適化です．"
publicationProfile:
  label: "PUBLICATION PROFILE"
  title: "主な発表先"
  intro: "国際学術誌および国際会議に80編以上の論文を発表しており，主な発表先は以下の通りです．"
  opportunity: "**工学，情報科学，人工知能に関心を持つ修士課程・学部学生を歓迎しています．また，医療・ヘルスケア関連研究に関心のある研究者との共同研究も歓迎します．研究内容に興味がありましたら，お気軽にメールでご連絡ください．**"
