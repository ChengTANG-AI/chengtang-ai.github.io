biography:
  label: "BIOGRAPHY"
  title: "About"
  paragraphs:
    - "I am currently a tenured Associate Professor in the Graduate School of Engineering at **[Nagoya Institute of Technology](https://www.nitech.ac.jp/)**, Nagoya, Japan, where I lead the Tang Laboratory as the principal investigator and supervise graduate students."
    - "I received my M.E. and Ph.D. degrees in engineering from the **[University of Toyama](https://www.u-toyama.ac.jp/)**, Toyama, Japan, in 2020 and 2022, respectively. From 2022 to 2023, I was an Assistant Professor at the **[Hirata Laboratory](https://cem.web.nitech.ac.jp/hilab/)**, supervised by **[Prof. Hirata](https://scholar.google.com/citations?user=zSV81YwAAAAJ)**, Graduate School of Engineering Tsukuri College, **[Nagoya Institute of Technology](https://www.nitech.ac.jp/)**, Nagoya, Japan. In 2023, I joined **[Kyushu University](https://www.kyushu-u.ac.jp/ja/)**, Fukuoka, Japan, where I was an Assistant Professor (Tenured) with the Department of Advanced Information Technology, Graduate School and Faculty of Information Science and Electrical Engineering. I conducted my research in the **[Laboratory for Image and Media Understanding](https://www.eng.kyushu-u.ac.jp/lab_electrical33.html)**, supervised by **[Prof. Shimada](https://scholar.google.com/citations?user=gc2kslQAAAAJ)**. In 2026, I joined Nagoya Institute of Technology, Nagoya, Japan, where I currently hold my position."
    - "My primary research interests include medical data mining, time series forecasting, computer vision, natural language processing, learning analytics, AI for drug design, explainable AI (XAI), and optimization."
