  text: '**[43rd International Conference on Machine Learning](https://icml.cc/Conferences/2026)**（ICML 2026）において，優れた査読貢献が評価され，**Silver Reviewer**に選出されました．'
news_2026_06_28_01:
  title: AAAI 2027，プログラム委員
  person_name: 唐成
  person_type: 教員
  position: 准教授
  text: 'は，**[41th Annual AAAI Conference on Artificial Intelligence](https://aaai.org/conference/aaai/aaai-27/)**（AAAI 2027）の**プログラム委員**を務めました．同会議は2027年2月16日から23日までカナダのモントリオールで開催されました．'
news_2026_06_28_02:
  title: ICONIP 2026，プログラム委員
  person_name: 唐成
  person_type: 教員
  position: 准教授
  text: 'は，**[International Conference on Neural Information Processing](https://iconip2026.apnns.org/)**（ICONIP 2026）の**プログラム委員**を務めました．同会議は2026年11月23日から27日までオーストラリア・メルボルンで開催されました．'
news_2026_04_02_01:
