news_2024_03_12_01:
  title: DSAA 2024，プログラム委員
  person_name: 唐成
  person_type: 教員
  position: 助教
  text: 'は，**[11th IEEE International Conference on Data Science and Advanced Analytics](https://indigopurple.github.io/DSAA/dsaa2024.html)**（DSAA 2024）の**プログラム委員**を務めました．同会議は2024年10月6日から10日まで米国カリフォルニア州サンディエゴで開催されました．'
