news_2023_02_01_01:
  title: COVID-19 AI・シミュレーションプロジェクト，共同研究者
  person_name: 唐成
  person_type: 教員
  position: 助教
  text: 'は，**[COVID-19 AI・シミュレーションプロジェクト](https://www.covid19-ai.jp/ja-jp/)** に**共同研究者**として参画しました．関連成果には **[東京都における新規陽性者数の長期予測](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** および **[第8波後の新規陽性者数の予測：XBB.1.5拡大の可能性](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)** が含まれます．'
