news_2023_02_01_01:
  title: COVID-19 AI 与仿真项目，共同研究者
  person_name: 唐成
  person_type: 教员
  position: 助理教授
  text: '作为**共同研究者**参与 **[COVID-19 AI 与仿真项目](https://www.covid19-ai.jp/ja-jp/)**。相关成果包括 **[东京都新增阳性人数长期预测](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** 以及 **[第8波后新增阳性人数预测：XBB.1.5 扩大的可能性](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)**。'
