news_2023_02_01_01:
  display: true
  date: '2023-02-01'
  student_year: ''
  title: COVID-19 AI & Simulation Project, Co-Investigator
  person_name: Cheng Tang
  person_type: Faculty
  position: Assistant Professor
  text: 'participated in the **[COVID-19 AI & Simulation Project](https://www.covid19-ai.jp/ja-jp/)** as a **Co-Investigator**. Related outputs include **[Long-term projection of new positives in Tokyo](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** and **[Projection of new positives after the 8th wave: Possibility of XBB.1.5 expansion](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)**, conducted for the Cabinet Agency for Infectious Disease Crisis Management, Cabinet Secretariat, Japan.'
