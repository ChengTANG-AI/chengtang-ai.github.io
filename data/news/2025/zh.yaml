news_2025_07_10_01:
  title: EDE Student SIG Offline Event，邀请报告
  person_name: 唐成
  person_type: 教员
  position: 助理教授
  text: '在 **[EDE Student SIG Offline Event](https://sites.google.com/leds.ait.kyushu-u.ac.jp/iclea2025/ede-student-sig-offline-event?authuser=0)** 作了**邀请报告**。该活动与 **[第1届 International Conference on Learning Evidence and Analytics](https://sites.google.com/leds.ait.kyushu-u.ac.jp/iclea2025/?pli=1)**（ICLEA 2025）共同举办，会议于2025年9月5日至7日在日本福冈举行。'
