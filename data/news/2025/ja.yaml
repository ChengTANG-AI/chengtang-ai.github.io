  text: 'は，**[6th IEEE International Conference on Cybernetics](https://www.ieeecyb2026.net/)**（IEEE CYB 2026）の**プログラム委員**を務めました．同会議は2026年4月17日から20日まで中国江蘇省南京市で開催されました．'
