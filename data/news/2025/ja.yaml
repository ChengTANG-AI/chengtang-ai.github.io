news_2025_06_28_01:
  title: AAAI 2026，プログラム委員
  person_name: 唐成
  person_type: 教員
  position: 准教授
  text: 'は，**[40th Annual AAAI Conference on Artificial Intelligence](https://aaai.org/conference/aaai/aaai-26/)**（AAAI 2026）の**プログラム委員**を務めました．同会議は2026年1月20日から27日までシンガポールのSingapore EXPOで開催されました．'
