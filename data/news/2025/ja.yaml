news_2025_07_10_01:
  title: EDE Student SIG Offline Event，招待講演
  person_name: 唐成
  person_type: 教員
  position: 助教
  text: 'は，**[1st International Conference on Learning Evidence and Analytics](https://sites.google.com/leds.ait.kyushu-u.ac.jp/iclea2025/?pli=1)**（ICLEA 2025）併設の **[EDE Student SIG Offline Event](https://sites.google.com/leds.ait.kyushu-u.ac.jp/iclea2025/ede-student-sig-offline-event?authuser=0)** において**招待講演者**として登壇しました．同会議は2025年9月5日から7日まで福岡で開催されました．'
