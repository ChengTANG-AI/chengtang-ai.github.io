# Research data are shared across English, Japanese, and Chinese pages.
# directions: define the major research directions shown on the page.
# papers: define research-introduction entries. Use the paper title as the key,
# then set direction to one of the direction keys below.
# display: true shows the item; display: false hides it.

directions:
  dendritic_computation:
    display: true
    title:
      en: "Dendritic Computation"
      ja: "樹状突起計算"
      zh: "树突计算"
    description:
      en: "Computational models and learning algorithms inspired by dendritic processing in biological neurons."
      ja: "生物学的ニューロンにおける樹状突起の情報処理に着想を得た計算モデルと学習アルゴリズムを研究します．"
      zh: "研究受生物神经元树突信息处理机制启发的计算模型与学习算法。"

  medical_data_mining:
    display: true
    title:
      en: "Medical Data Mining"
      ja: "医療データマイニング"
      zh: "医疗数据挖掘"
    description:
      en: "Methods for discovering clinically meaningful patterns from heterogeneous medical and healthcare data."
      ja: "多様な医療・ヘルスケアデータから臨床的に有用な知見を抽出する方法を研究します．"
      zh: "研究从多源医疗与健康数据中挖掘具有临床意义知识的方法。"

  time_series_forecasting:
    display: true
    title:
      en: "Time Series Forecasting"
      ja: "時系列予測"
      zh: "时间序列预测"
    description:
      en: "Modeling temporal dynamics for prediction, monitoring, and decision support in real-world systems."
      ja: "実世界システムにおける予測・監視・意思決定支援のために，時間変化を捉えるモデルを研究します．"
      zh: "研究面向真实系统预测、监测与决策支持的时间动态建模方法。"

  computer_vision:
    display: true
    title:
      en: "Computer Vision"
      ja: "コンピュータビジョン"
      zh: "计算机视觉"
    description:
      en: "Visual recognition and analysis methods for images, videos, and multimodal real-world observations."
      ja: "画像・映像・マルチモーダルな実世界観測を対象とした認識・解析手法を研究します．"
      zh: "研究面向图像、视频与多模态真实观测数据的识别和分析方法。"

  natural_language_processing:
    display: true
    title:
      en: "Natural Language Processing"
      ja: "自然言語処理"
      zh: "自然语言处理"
    description:
      en: "Language understanding and generation techniques for extracting, organizing, and using knowledge."
      ja: "知識の抽出・整理・活用を支える言語理解・生成技術を研究します．"
      zh: "研究用于知识抽取、组织与利用的语言理解和生成技术。"

  learning_analytics:
    display: true
    title:
      en: "Learning Analytics"
      ja: "ラーニングアナリティクス"
      zh: "学习分析"
    description:
      en: "Data-driven analysis of learning behavior for understanding, prediction, and educational support."
      ja: "学習行動データを用いて，理解・予測・教育支援を行うための分析手法を研究します．"
      zh: "研究基于学习行为数据的理解、预测与教育支持方法。"

  ai_for_drug_design:
    display: true
    title:
      en: "AI for Drug Design"
      ja: "創薬AI"
      zh: "计算机辅助药物设计"
    description:
      en: "AI methods for molecular representation, property prediction, and data-driven drug discovery."
      ja: "分子表現，物性予測，データ駆動型創薬を支えるAI技術を研究します．"
      zh: "研究面向分子表示、性质预测和数据驱动药物发现的人工智能方法。"

  explainable_ai:
    display: true
    title:
      en: "Explainable AI (XAI)"
      ja: "説明可能AI（XAI）"
      zh: "可解释人工智能（XAI）"
    description:
      en: "Transparent and trustworthy AI methods that make model behavior understandable to humans."
      ja: "モデルの振る舞いを人間が理解できる，透明で信頼性の高いAI手法を研究します．"
      zh: "研究能够让人理解模型行为的透明、可信人工智能方法。"

  optimization:
    display: true
    title:
      en: "Optimization"
      ja: "最適化"
      zh: "优化"
    description:
      en: "Optimization algorithms for learning, search, scheduling, and intelligent system design."
      ja: "学習，探索，スケジューリング，知的システム設計のための最適化アルゴリズムを研究します．"
      zh: "研究用于学习、搜索、调度和智能系统设计的优化算法。"

papers:
  "Dendritic neural network: a novel extension of dendritic neuron model":
    display: true
    direction: "dendritic_computation"
    image: "images/research/dendritic_computation/DNN.png"
    contributions:
      en:
        - "Proposed the Dendritic Neural Network (DNN), extending the conventional dendritic neuron model into a neural network."
        - "Introduced flexible synaptic and dendritic structures for enhanced nonlinear learning."
        - "Developed a dendrite-aware dropout mechanism to mitigate gradient vanishing."
        - "Designed a multi-output architecture for complex classification tasks."
        - "Achieved state-of-the-art performance on benchmark classification datasets."
      ja:
        - "従来の樹状突起ニューロンモデルをニューラルネットワークへ拡張した Dendritic Neural Network（DNN）を提案しました．"
        - "柔軟なシナプス構造と樹状突起構造を導入し，非線形学習能力を高めました．"
        - "勾配消失を緩和するため，樹状突起構造を考慮したドロップアウト機構を開発しました．"
        - "複雑な分類タスクに対応するため，マルチ出力アーキテクチャを設計しました．"
        - "ベンチマーク分類データセットにおいて最先端性能を達成しました．"
      zh:
        - "提出 Dendritic Neural Network（DNN），将传统树突神经元模型扩展为神经网络。"
        - "引入灵活的突触结构与树突结构，以增强非线性学习能力。"
        - "开发面向树突结构的 dropout 机制，以缓解梯度消失问题。"
        - "设计多输出架构，用于处理复杂分类任务。"
        - "在基准分类数据集上取得了先进性能。"

  "Artificial immune system training algorithm for a dendritic neuron model":
    display: true
    direction: "dendritic_computation"
    image: "images/research/dendritic_computation/AISDNM.png"
    contributions:
      en:
        - "Proposed an artificial immune system (AIS) training algorithm for the dendritic neuron model."
        - "Improved the optimization capability of DNM through immune-inspired global search."
        - "Enhanced convergence speed and reduced the risk of local optima compared with backpropagation."
        - "Preserved the neuronal pruning mechanism for automatic model simplification."
        - "Enabled hardware implementation through logic circuit transformation."
      ja:
        - "樹状突起ニューロンモデルのための人工免疫システム（AIS）学習アルゴリズムを提案しました．"
        - "免疫機構に着想を得た大域探索により，DNM の最適化能力を向上させました．"
        - "誤差逆伝播法と比較して，収束速度を高め，局所最適解に陥るリスクを低減しました．"
        - "モデルを自動的に簡略化するためのニューロン枝刈り機構を維持しました．"
        - "論理回路への変換を通じてハードウェア実装を可能にしました．"
      zh:
        - "提出用于树突神经元模型的人工免疫系统（AIS）训练算法。"
        - "通过受免疫机制启发的全局搜索，提高 DNM 的优化能力。"
        - "与反向传播相比，提高了收敛速度，并降低陷入局部最优的风险。"
        - "保留神经元剪枝机制，实现模型的自动简化。"
        - "通过逻辑电路转换支持硬件实现。"

  "A survey on dendritic neuron model: mechanisms, algorithms and practical applications":
    display: true
    direction: "dendritic_computation"
    image: "images/research/dendritic_computation/SDNM.png"
    contributions:
      en:
        - "Presented the first comprehensive survey of the dendritic neuron model (DNM)."
        - "Systematically reviewed the mechanisms, learning algorithms, and practical applications of DNM."
        - "Analyzed the neural pruning and logic circuit transformation mechanisms of DNM."
        - "Compared representative optimization algorithms for training DNM through extensive experiments."
        - "Discussed the challenges and future research directions of dendritic neuron models."
      ja:
        - "樹状突起ニューロンモデル（DNM）に関する初めての包括的なサーベイを提示しました．"
        - "DNM の機構，学習アルゴリズム，実応用を体系的に整理しました．"
        - "DNM におけるニューロン枝刈り機構と論理回路変換機構を分析しました．"
        - "広範な実験により，DNM 学習のための代表的な最適化アルゴリズムを比較しました．"
        - "樹状突起ニューロンモデルの課題と今後の研究方向を議論しました．"
      zh:
        - "提出首篇关于树突神经元模型（DNM）的综合性综述。"
        - "系统梳理了 DNM 的机制、学习算法和实际应用。"
        - "分析了 DNM 的神经元剪枝机制和逻辑电路转换机制。"
        - "通过大量实验比较了用于训练 DNM 的代表性优化算法。"
        - "讨论了树突神经元模型面临的挑战和未来研究方向。"

  "An evolutionary neuron model with dendritic computation for classification and prediction":
    display: true
    direction: "dendritic_computation"
    publication_title: "Evolutionary dendritic neural model for classification problems"
    image: "images/research/dendritic_computation/EDNM.png"
    contributions:
      en:
        - "Proposed an evolutionary dendritic neuron model (FADNM) using the firefly algorithm for classification and prediction."
        - "Improved the learning capability of the dendritic neuron model through metaheuristic optimization."
        - "Introduced a neural pruning scheme to automatically simplify dendritic structures."
        - "Enabled hardware implementation of the pruned model using logic circuits."
        - "Demonstrated superior performance on both classification and time series prediction tasks."
      ja:
        - "分類と予測のため，ホタルアルゴリズムを用いた進化型樹状突起ニューロンモデル（FADNM）を提案しました．"
        - "メタヒューリスティック最適化により，樹状突起ニューロンモデルの学習能力を向上させました．"
        - "樹状突起構造を自動的に簡略化するためのニューロン枝刈り手法を導入しました．"
        - "枝刈り後のモデルを論理回路でハードウェア実装できるようにしました．"
        - "分類タスクと時系列予測タスクの両方で優れた性能を示しました．"
      zh:
        - "提出用于分类与预测的进化型树突神经元模型（FADNM），并采用萤火虫算法进行训练。"
        - "通过元启发式优化提升树突神经元模型的学习能力。"
        - "引入神经元剪枝方案，自动简化树突结构。"
        - "利用逻辑电路实现剪枝后模型的硬件实现。"
        - "在分类任务和时间序列预测任务上均展示了优异性能。"

  "A novel machine learning technique for computer-aided diagnosis":
    display: true
    direction: "medical_data_mining"
    image: "images/research/medical_data_mining/EDNM.png"
    contributions:
      en:
        - "Proposed an evolutionary dendritic neuron model (EDNM) for computer-aided medical diagnosis."
        - "Optimized the model using the gbest-guided artificial bee colony algorithm."
        - "Introduced a neuronal pruning mechanism for automatic model simplification."
        - "Enabled direct hardware implementation through logic circuits."
        - "Demonstrated superior diagnostic performance on multiple medical datasets."
      ja:
        - "コンピュータ支援医療診断のための進化型樹状突起ニューロンモデル（EDNM）を提案しました．"
        - "gbest 誘導型人工蜂コロニーアルゴリズムを用いてモデルを最適化しました．"
        - "モデルを自動的に簡略化するためのニューロン枝刈り機構を導入しました．"
        - "論理回路による直接的なハードウェア実装を可能にしました．"
        - "複数の医療データセットにおいて優れた診断性能を示しました．"
      zh:
        - "提出用于计算机辅助医疗诊断的进化型树突神经元模型（EDNM）。"
        - "采用 gbest 引导的人工蜂群算法对模型进行优化。"
        - "引入神经元剪枝机制，实现模型的自动简化。"
        - "通过逻辑电路支持模型的直接硬件实现。"
        - "在多个医疗数据集上展示了优异的诊断性能。"

  "A novel multivariate time series forecasting dendritic neuron model for COVID-19 pandemic transmission tendency":
    display: true
    direction: "medical_data_mining"
    image: "images/research/medical_data_mining/DFDNM.png"
    contributions:
      en:
        - "Proposed a densely connected highly flexible dendritic neuron model (DFDNM) for multivariate time series forecasting."
        - "Introduced dense shortcut connections to alleviate vanishing and exploding gradient problems."
        - "Developed a highly flexible dendritic architecture with AdamW-based optimization."
        - "Achieved state-of-the-art performance in long-term COVID-19 transmission forecasting."
        - "Demonstrated the generalizability of DFDNM on multiple multivariate forecasting benchmarks."
      ja:
        - "多変量時系列予測のための密結合型高柔軟性樹状突起ニューロンモデル（DFDNM）を提案しました．"
        - "勾配消失および勾配爆発の問題を緩和するため，密なショートカット接続を導入しました．"
        - "AdamW に基づく最適化を用いた高柔軟性樹状突起アーキテクチャを開発しました．"
        - "COVID-19 感染拡大傾向の長期予測において最先端性能を達成しました．"
        - "複数の多変量予測ベンチマークにより，DFDNM の汎化性能を示しました．"
      zh:
        - "提出用于多变量时间序列预测的密集连接高柔性树突神经元模型（DFDNM）。"
        - "引入密集快捷连接，以缓解梯度消失和梯度爆炸问题。"
        - "开发结合 AdamW 优化的高柔性树突结构。"
        - "在 COVID-19 传播趋势长期预测中取得了先进性能。"
        - "在多个多变量预测基准任务上验证了 DFDNM 的泛化能力。"

  "Transmission trend of the COVID-19 pandemic predicted by dendritic neural regression":
    display: true
    direction: "medical_data_mining"
    image: "images/research/medical_data_mining/DNR.png"
    contributions:
      en:
        - "Proposed a dendritic neural regression (DNR) model for COVID-19 transmission trend prediction."
        - "Introduced branch-strength modeling to enhance the regression capability of dendritic neural networks."
        - "Developed a scale-free state-of-matter search (SFSMS) algorithm for efficient optimization of DNR."
        - "Integrated phase space reconstruction to capture hidden nonlinear dynamics in epidemic time series."
        - "Achieved superior forecasting performance over state-of-the-art machine learning and deep learning methods."
      ja:
        - "COVID-19 感染拡大傾向予測のための樹状突起ニューラル回帰（DNR）モデルを提案しました．"
        - "樹状突起ニューラルネットワークの回帰能力を高めるため，枝強度モデリングを導入しました．"
        - "DNR を効率的に最適化するため，スケールフリー物質状態探索（SFSMS）アルゴリズムを開発しました．"
        - "感染症時系列に潜む非線形ダイナミクスを捉えるため，位相空間再構成を統合しました．"
        - "最先端の機械学習および深層学習手法を上回る予測性能を達成しました．"
      zh:
        - "提出用于 COVID-19 传播趋势预测的树突神经回归（DNR）模型。"
        - "引入分支强度建模，以增强树突神经网络的回归能力。"
        - "开发无标度物质状态搜索（SFSMS）算法，用于高效优化 DNR。"
        - "结合相空间重构，捕捉疫情时间序列中隐藏的非线性动态。"
        - "相比先进机器学习和深度学习方法取得了更优的预测性能。"

  "Adopting a dendritic neural model for predicting stock price index movement":
    display: true
    direction: "time_series_forecasting"
    image: "images/research/time_series_forecasting/FDNM.png"
    contributions:
      en:
        - "Proposed a dendritic neural model (DNM) for financial time series forecasting."
        - "Developed a scale-free differential evolution (SFDE) algorithm for optimizing DNM."
        - "Integrated phase space reconstruction to capture the chaotic dynamics of financial time series."
        - "Improved the balance between exploration and exploitation through scale-free optimization."
        - "Achieved superior prediction performance on multiple benchmark stock market indices."
      ja:
        - "金融時系列予測のための樹状突起ニューラルモデル（DNM）を提案しました．"
        - "DNM を最適化するためのスケールフリー差分進化（SFDE）アルゴリズムを開発しました．"
        - "金融時系列のカオス的ダイナミクスを捉えるため，位相空間再構成を統合しました．"
        - "スケールフリー最適化により，探索と活用のバランスを改善しました．"
        - "複数のベンチマーク株価指数において優れた予測性能を達成しました．"
      zh:
        - "提出用于金融时间序列预测的树突神经模型（DNM）。"
        - "开发用于优化 DNM 的无标度差分进化（SFDE）算法。"
        - "结合相空间重构，以捕捉金融时间序列中的混沌动态。"
        - "通过无标度优化改善探索与开发之间的平衡。"
        - "在多个基准股票市场指数上取得了优异的预测性能。"

  "A survey on machine learning models for financial time series forecasting":
    display: true
    direction: "time_series_forecasting"
    image: "images/research/time_series_forecasting/MLTSF.png"
    contributions:
      en:
        - "Presented a comprehensive survey of machine learning models for financial time series forecasting."
        - "Systematically compared the strengths and limitations of mainstream forecasting models."
        - "Summarized widely used financial datasets, evaluation metrics, and forecasting tasks."
        - "Analyzed recent research trends and the growing adoption of deep learning and hybrid models."
        - "Identified open challenges and future research directions for financial time series forecasting."
      ja:
        - "金融時系列予測のための機械学習モデルに関する包括的なサーベイを提示しました．"
        - "主要な予測モデルの利点と限界を体系的に比較しました．"
        - "広く用いられている金融データセット，評価指標，予測タスクを整理しました．"
        - "近年の研究動向と，深層学習およびハイブリッドモデルの利用拡大を分析しました．"
        - "金融時系列予測における未解決課題と今後の研究方向を示しました．"
      zh:
        - "提出关于金融时间序列预测机器学习模型的综合性综述。"
        - "系统比较了主流预测模型的优势与局限性。"
        - "总结了常用金融数据集、评价指标和预测任务。"
        - "分析了近期研究趋势以及深度学习和混合模型的广泛应用。"
        - "指出了金融时间序列预测中的开放挑战和未来研究方向。"

  "Enhancing nonlinear dependencies of Mamba via negative feedback for time series forecasting":
    display: true
    direction: "time_series_forecasting"
    image: "images/research/time_series_forecasting/CME-Mamba.png"
    contributions:
      en:
        - "Proposed CME-Mamba to enhance nonlinear dependency modeling for time series forecasting."
        - "Introduced a Maclaurin-based negative feedback mechanism for nonlinear feature enhancement."
        - "Developed an embedding channel attention mechanism to jointly capture temporal and inter-variate dependencies."
        - "Incorporated an Einstein FFT block to alleviate gradient vanishing and improve training stability."
        - "Achieved state-of-the-art performance on 11 real-world time series forecasting benchmarks."
      ja:
        - "時系列予測における非線形依存関係モデリングを強化する CME-Mamba を提案しました．"
        - "非線形特徴を強化するため，Maclaurin 展開に基づく負帰還機構を導入しました．"
        - "時間方向の依存関係と変数間依存関係を同時に捉える埋め込みチャネル注意機構を開発しました．"
        - "勾配消失を緩和し，学習安定性を向上させるため，Einstein FFT ブロックを組み込みました．"
        - "11 個の実世界時系列予測ベンチマークで最先端性能を達成しました．"
      zh:
        - "提出 CME-Mamba，以增强时间序列预测中的非线性依赖建模能力。"
        - "引入基于 Maclaurin 展开的负反馈机制，用于非线性特征增强。"
        - "开发嵌入通道注意力机制，同时捕捉时间依赖与变量间依赖。"
        - "引入 Einstein FFT 模块，以缓解梯度消失并提升训练稳定性。"
        - "在 11 个真实世界时间序列预测基准上取得了先进性能。"

  "Evolutionary neural architecture design of liquid state machine for image classification":
    display: true
    direction: "computer_vision"
    image: "images/research/computer_vision/LSM-SHADE.png"
    contributions:
      en:
        - "Proposed an evolutionary neural architecture design framework for liquid state machines (LSMs)."
        - "Developed a SHADE-based optimization strategy for automatic neural architecture search."
        - "Optimized key reservoir hyperparameters without prior knowledge or manual tuning."
        - "Improved the classification performance of LSM through evolutionary architecture optimization."
        - "Demonstrated superior performance on handwritten image classification benchmarks."
      ja:
        - "液体状態機械（LSM）のための進化的ニューラルアーキテクチャ設計フレームワークを提案しました．"
