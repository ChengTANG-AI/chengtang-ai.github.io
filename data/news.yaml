news_2023_02_01_01:
  display: true
  date: "2023-02-01"
  student_year: ""
  title:
    en: "COVID-19 AI & Simulation Project, Co-Investigator"
    ja: "COVID-19 AI・シミュレーションプロジェクト，共同研究者"
    zh: "COVID-19 AI 与仿真项目，共同研究者"
  person_name:
    en: "Cheng Tang"
    ja: "唐成"
    zh: "唐成"
  person_type:
    en: "Faculty"
    ja: "教員"
    zh: "教员"
  position:
    en: "Assistant Professor"
    ja: "助教"
    zh: "助理教授"
  text:
    en: "participated in the **[COVID-19 AI & Simulation Project](https://www.covid19-ai.jp/ja-jp/)** as a **Co-Investigator**. Related outputs include **[Long-term projection of new positives in Tokyo](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** and **[Projection of new positives after the 8th wave: Possibility of XBB.1.5 expansion](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)**, conducted for the Cabinet Agency for Infectious Disease Crisis Management, Cabinet Secretariat, Japan."
    ja: "は，**[COVID-19 AI・シミュレーションプロジェクト](https://www.covid19-ai.jp/ja-jp/)** に**共同研究者**として参画しました．関連成果には **[東京都における新規陽性者数の長期予測](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** および **[第8波後の新規陽性者数の予測：XBB.1.5拡大の可能性](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)** が含まれます．"
    zh: "作为**共同研究者**参与 **[COVID-19 AI 与仿真项目](https://www.covid19-ai.jp/ja-jp/)**。相关成果包括 **[东京都新增阳性人数长期预测](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article435/)** 以及 **[第8波后新增阳性人数预测：XBB.1.5 扩大的可能性](https://www.covid19-ai.jp/en-us/presentation/2022_rq1_simulations_for_infection_situations/articles/article427/)**。"

