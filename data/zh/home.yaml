  opportunity: "**欢迎工学、计算机科学和人工智能等方向的本科生、硕士生与我联系，也欢迎对医疗健康相关课题感兴趣的研究者开展合作。如果你对我的研究方向感兴趣，请随时通过电子邮件联系我。**"
