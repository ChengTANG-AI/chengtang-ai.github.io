biography:
  label: "BIOGRAPHY"
  title: "个人简介"
  paragraphs:
    - "我目前是**[名古屋工业大学](https://www.nitech.ac.jp/)**大学院工学研究科的副教授，主持唐研究室，并指导研究生开展科研工作。"
    - "我分别于2020年和2022年在**[富山大学](https://www.u-toyama.ac.jp/)**获得工学硕士和博士学位。2022年至2023年，我在**[名古屋工业大学](https://www.nitech.ac.jp/)**大学院工学研究科 **[平田研究室](https://cem.web.nitech.ac.jp/hilab/)** 担任助教。2023年，我加入**[九州大学](https://www.kyushu-u.ac.jp/ja/)**大学院系统信息科学研究院，并在**[岛田教授](https://scholar.google.com/citations?user=gc2kslQAAAAJ)**指导的图像媒体理解研究室开展研究。2026年，我加入名古屋工业大学并任现职。"
    - "我的主要研究方向包括医疗数据挖掘、时序预测、计算机视觉、自然语言处理、学习分析、AI药物设计、可解释人工智能（XAI）以及优化算法。"
